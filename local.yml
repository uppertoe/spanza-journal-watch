volumes:
  spanza_journal_watch_local_postgres_data: {}
  spanza_journal_watch_local_postgres_data_backups: {}
  spanza_journal_watch_local_planka_data: {}
  spanza_journal_watch_local_planka_postgres_data: {}
  spanza_journal_watch_local_backup_repo: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: spanza_journal_watch_local_django
    container_name: spanza_journal_watch_local_django
    depends_on:
      - postgres
      - redis
      - mailhog
      - mjml
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    environment:
      PLANKA_BASE_URL: http://planka:1337
      # Must match DEFAULT_ADMIN_EMAIL in the planka service below
      PLANKA_ADMIN_EMAIL: demo@demo.demo
      PLANKA_DB_URL: postgresql://postgres@planka_postgres/planka
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: spanza_journal_watch_production_postgres
    container_name: spanza_journal_watch_local_postgres
    volumes:
      - spanza_journal_watch_local_postgres_data:/var/lib/postgresql/data
      - spanza_journal_watch_local_postgres_data_backups:/backups
      - ./backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  docs:
    image: spanza_journal_watch_local_docs
    container_name: spanza_journal_watch_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    profiles: ['tools']
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./spanza_journal_watch:/app/spanza_journal_watch:z
    ports:
      - '9000:9000'
    command: /start-docs

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: spanza_journal_watch_local_mailhog
    ports:
      - '8025:8025'

  redis:
    image: redis:7
    container_name: spanza_journal_watch_local_redis

  celeryworker:
    <<: *django
    image: spanza_journal_watch_local_celeryworker
    container_name: spanza_journal_watch_local_celeryworker
    profiles: ['workers']
    depends_on:
      - redis
      - postgres
      - mailhog
      - mjml
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: spanza_journal_watch_local_celerybeat
    container_name: spanza_journal_watch_local_celerybeat
    profiles: ['workers']
    depends_on:
      - redis
      - postgres
      - mailhog
      - mjml
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: spanza_journal_watch_local_flower
    container_name: spanza_journal_watch_local_flower
    profiles: ['workers']
    ports:
      - '5555:5555'
    command: /start-flower

  node:
    build:
      context: .
      dockerfile: ./compose/local/node/Dockerfile
    image: spanza_journal_watch_local_node
    container_name: spanza_journal_watch_local_node
    depends_on:
      - django
    volumes:
      - .:/app:z
      # http://jdlm.info/articles/2016/03/06/lessons-building-node-app-docker.html
      - /app/node_modules
    environment:
      NODE_OPTIONS: --max-old-space-size=384
    command: npm run dev
    ports:
      - '3000:3000'

  mjml:
    build:
      context: .
      dockerfile: ./compose/production/mjml-tcp/Dockerfile
    image: spanza_journal_watch_production_mjml
    container_name: spanza_journal_watch_local_mjml
    restart: always
    ports:
      - '28101:28101'
    command: ['--mjml.validationLevel=strict']

  planka:
    image: ghcr.io/plankanban/planka:2.0.3
    container_name: spanza_journal_watch_local_planka
    profiles: ['planka']
    restart: on-failure
    depends_on:
      planka_postgres:
        condition: service_healthy
    volumes:
      - spanza_journal_watch_local_planka_data:/app/data
      - ./compose/planka/custom:/app/terms/custom:ro
    ports:
      - '3001:1337'
    environment:
      BASE_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres@planka_postgres/planka
      SECRET_KEY: notsecretkey
      SWAGGER_EXPOSED: 'true'
      # Django acts as the OIDC provider — run `manage.py setup_planka_oidc` to register the application
      # localhost:8000 is reachable from the browser; extra_hosts below makes it reachable from inside the container too
      OIDC_ISSUER: http://localhost:8000/o
      OIDC_CLIENT_ID: planka-local
      OIDC_CLIENT_SECRET: planka-local-oidc-secret-changeme
      OIDC_USE_DEFAULT_RESPONSE_MODE: 'true'
      OIDC_SCOPES: openid email profile
      OIDC_EMAIL_ATTRIBUTE: email
      OIDC_NAME_ATTRIBUTE: name
      OIDC_IGNORE_USERNAME: 'true'
      OIDC_IGNORE_ROLES: 'true'
      # Enable AFTER running setup_planka_api_key from the backend settings UI.
      # That command initialises the instance (admin REST login) — only then will
      # OIDC_ENFORCED work correctly. Uncomment and restart Planka to enforce SSO.
      # OIDC_ENFORCED: 'true'
      DEFAULT_ADMIN_EMAIL: demo@demo.demo
      DEFAULT_ADMIN_PASSWORD: demo
      DEFAULT_ADMIN_NAME: Demo Demo
      DEFAULT_ADMIN_USERNAME: demo
    extra_hosts:
      - 'localhost:host-gateway'

  # ---------------------------------------------------------------------------
  # Backup — local testing container (profile: backup)
  # ---------------------------------------------------------------------------
  # Provides a pre-built environment (restic + msmtp + postgresql-client) with
  # the backup scripts bind-mounted from compose/backup/.  Changes to scripts
  # on the host are reflected immediately without rebuilding the image.
  #
  # Mailhog is used as the SMTP server so notification emails can be inspected
  # at http://localhost:8025 without sending real mail.
  #
  # Usage:
  #   # Dry run — see what would happen
  #   docker compose --profile backup run --rm backup /backup/backup.sh --dry-run
  #
  #   # Full backup + verify (emails appear in Mailhog)
  #   docker compose --profile backup run --rm backup /backup/backup.sh --verify
  #
  #   # Test restore into a temporary database (safe — does not touch production)
  #   docker compose --profile backup run --rm backup \
  #     /backup/restore.sh --database django --target django_restore_test
  #
  #   # Interactive shell
  #   docker compose --profile backup run --rm backup bash
  backup:
    build:
      context: .
      dockerfile: ./compose/local/backup/Dockerfile
    profiles: ['backup']
    volumes:
      - ./compose/backup:/backup:ro # bind mount — edit scripts on host
      - spanza_journal_watch_local_backup_repo:/restic-repo # local restic repo
    environment:
      # Restic — uses a local volume instead of S3
      RESTIC_REPOSITORY: /restic-repo
      RESTIC_PASSWORD: local-test-password
      # Django postgres — same credentials as the local stack
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      # Planka postgres — only reachable when --profile planka is also active;
      # backup.sh skips Planka gracefully if the host is not reachable
      PLANKA_DB_HOST: planka_postgres
      PLANKA_DB_PORT: '5432'
      # Retention — short values to keep the local repo small
      KEEP_DAILY: '3'
      KEEP_WEEKLY: '2'
      KEEP_MONTHLY: '1'
      # Notifications via Mailhog (no auth, no TLS)
      SMTP_HOST: mailhog
      SMTP_PORT: '1025'
      SMTP_TLS: 'off'
      SMTP_FROM: backup@journalwatch.local
      ALERT_EMAIL: admin@journalwatch.local
      NOTIFY_ON_SUCCESS: 'true'
    env_file:
      - ./.envs/.local/.postgres # supplies POSTGRES_USER / POSTGRES_PASSWORD
    depends_on:
      - postgres
      - mailhog

  planka_postgres:
    image: postgres:16-alpine
    container_name: spanza_journal_watch_local_planka_postgres
    profiles: ['planka']
    restart: on-failure
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - spanza_journal_watch_local_planka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d planka']
      interval: 10s
      timeout: 5s
      retries: 5
