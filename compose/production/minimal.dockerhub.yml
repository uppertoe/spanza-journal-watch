volumes:
  postgres_data: {}
  postgres_data_backups: {}
  access_logs: {}
  planka_postgres_data: {}

services:
  django: &django
    image: ${DOCKERHUB_NAMESPACE}/journalwatch-app:${APP_TAG}
    restart: unless-stopped
    command: /start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mjml:
        condition: service_started
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    ports:
      - '5000:5000'
    volumes:
      - access_logs:/app/access_logs

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ./.envs/.production/.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_data_backups:/backups
    # Expose on loopback only so the VPS backup script (running on the host,
    # outside Docker) can connect via 127.0.0.1:5432.
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  mjml:
    image: ${DOCKERHUB_NAMESPACE}/journalwatch-mjml:${APP_TAG}
    restart: unless-stopped
    command: ['--mjml.minify=true', '--mjml.validationLevel=strict']
    expose:
      - '28101'

  celeryworker:
    <<: *django
    command: /start-celeryworker
    profiles: ['workers']
    ports: []

  celerybeat:
    <<: *django
    command: /start-celerybeat
    profiles: ['workers']
    ports: []

  flower:
    <<: *django
    command: /start-flower
    profiles: ['workers']
    ports:
      - '5555:5555'

  planka:
    image: ghcr.io/plankanban/planka:2.0.3
    restart: unless-stopped
    profiles: ['planka']
    depends_on:
      planka_postgres:
        condition: service_healthy
    volumes:
      - ./compose/planka/custom:/app/terms/custom:ro
    env_file:
      - ./.envs/.production/.planka
    ports:
      - '3001:1337'

  planka_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['planka']
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - planka_postgres_data:/var/lib/postgresql/data
    # Exposed on port 5433 (host) → 5432 (container) to avoid conflict with
    # the Django postgres on 5432.  The VPS backup script uses PLANKA_DB_PORT=5433.
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d planka']
      interval: 10s
      timeout: 5s
      retries: 5
