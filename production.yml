volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_traefik: {}
  access_logs: {} # Add a new volume definition for the logs
  production_planka_postgres_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile

    image: spanza_journal_watch_production_django
    depends_on:
      - postgres
      - redis
      - mjml
    volumes:
      - access_logs:/app/access_logs # Map the logs directory on the host to /app/logs inside the container
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    environment:
      PLANKA_BASE_URL: http://planka:1337
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: spanza_journal_watch_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres

  traefik:
    build:
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
    image: spanza_journal_watch_production_traefik
    depends_on:
      - django
    volumes:
      - production_traefik:/etc/traefik/acme
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'
      - '0.0.0.0:5555:5555'

  redis:
    image: redis:7

  celeryworker:
    <<: *django
    image: spanza_journal_watch_production_celeryworker
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: spanza_journal_watch_production_celerybeat
    command: /start-celerybeat

  flower:
    <<: *django
    image: spanza_journal_watch_production_flower
    command: /start-flower

  awscli:
    build:
      context: .
      dockerfile: ./compose/production/aws/Dockerfile
    env_file:
      - ./.envs/.production/.django
    volumes:
      - production_postgres_data_backups:/backups:z

  mjml:
    build:
      context: .
      dockerfile: ./compose/production/mjml-tcp/Dockerfile
    image: spanza_journal_watch_production_mjml
    container_name: spanza_journal_watch_production_mjml
    restart: always
    ports:
      - '28101:28101'
    command: ['--mjml.validationLevel=strict']

  planka:
    image: ghcr.io/plankanban/planka:2.0.3
    container_name: spanza_journal_watch_production_planka
    profiles: ['planka']
    restart: unless-stopped
    depends_on:
      planka_postgres:
        condition: service_healthy
    volumes:
      # No data volume — attachments stored in S3 (see .envs/.production/.planka)
      - ./compose/planka/custom:/app/terms/custom:ro
    env_file:
      - ./.envs/.production/.planka
    ports:
      - '3001:1337'

  planka_postgres:
    image: postgres:16-alpine
    container_name: spanza_journal_watch_production_planka_postgres
    profiles: ['planka']
    restart: unless-stopped
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - production_planka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d planka']
      interval: 10s
      timeout: 5s
      retries: 5
