<form class="input-group input-group-sm pe-sm-0 pe-5" id="subscribe-form">
  <input type="hidden" name="csrfmiddlewaretoken" value="__CSRF__" />
  <img
    id="subscribe-spinner"
    class="htmx-indicator px-2"
    src="/static/images/spinners/pulse-rings-multiple.svg"
  />
  <button
    class="btn btn-outline-primary"
    type="submit"
    hx-post="/newsletter/subscribe"
    hx-target="#subscribe-container"
    hx-indicator="#subscribe-spinner"
  >
    Submit
  </button>
  <input
    type="text"
    name="email"
    class="form-control"
    autofocus=""
    placeholder="Email address"
    maxlength="255"
    required
    id="id_email"
  />
</form>
