{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="p-3">
            <img src="{% static "images/errors/bell-slash.svg" %}" alt="Unsubscribe?" width="100px">
        </div>
        <h1>Unsubscribe from Journal Watch?</h1>

        <p>Confirm that you want to unsubscribe {{ email }} from the Journal Watch newsletter.</p>
        <form method="post" action="{% url "newsletter:confirm-unsubscribe" unsubscribe_token=unsubscribe_token %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-warning">Unsubscribe</button>
        </form>
    </div>
</div>
{% endblock content %}
