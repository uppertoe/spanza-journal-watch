<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Journal Watch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f5f0;
      color: #152b3b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 28rem;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #152b3b;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: #5a6d7a;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: #152b3b;
      color: #fff;
      border: none;
      border-radius: 0.25rem;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #1e3a4f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SPANZA Journal Watch</div>
    <h1>You're offline</h1>
    <p>This page isn't available right now. Check your connection and try again. Pages you've visited before may still be available.</p>
    <button class="btn" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
