{% extends 'base.html' %}
{% block main-feature %}
<div class="p-4 p-md-5 mb-4 rounded text-body-emphasis bg-body-secondary">
    <div class="col-lg-8 px-0">
        <h1 class="display-4 fst-italic">About</h1>
        <div class="lead my-3">Contributors from the following health services have written reviews for Journal Watch</div>
    </div>
</div>
{% endblock main-feature %}
{% block article-block %}
<form
    id="about-filter-form"
    class="card card-body mb-3"
    hx-get="{% url "submissions:about" %}"
    hx-target="#about-results"
    hx-push-url="true"
    hx-trigger="change"
>
    <div class="row g-2 align-items-center">
        <div class="col-12 col-lg-7">
            <input
                type="search"
                name="q"
                class="form-control"
                placeholder="Filter by health service or contributor"
                value="{{ query|default:'' }}"
                hx-get="{% url "submissions:about" %}"
                hx-target="#about-results"
                hx-include="#about-filter-form"
                hx-trigger="input changed delay:300ms, search"
                hx-push-url="true">
        </div>
        <div class="col-12 col-sm-7 col-lg-3">
            <select class="form-select" name="sort" aria-label="Sort services">
                <option value="contributors" {% if sort == "contributors" %}selected{% endif %}>Contributors (high to low)</option>
                <option value="reviews" {% if sort == "reviews" %}selected{% endif %}>Reviews (high to low)</option>
                <option value="name" {% if sort == "name" %}selected{% endif %}>Name A–Z</option>
            </select>
        </div>
        <div class="col-12 col-sm-5 col-lg-2 d-grid d-lg-flex justify-content-lg-end">
            <a class="btn btn-outline-secondary" href="{% url "submissions:about" %}" hx-get="{% url "submissions:about" %}" hx-target="#about-results" hx-push-url="true">Clear</a>
        </div>
    </div>
</form>

<div id="about-results">
    {% include "submissions/fragments/healthservice_cards.html" %}
</div>
{% endblock article-block %}
