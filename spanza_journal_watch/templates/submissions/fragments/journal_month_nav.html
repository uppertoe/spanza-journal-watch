<nav id="journal-month-nav" class="journal-month-nav" aria-label="Month navigation"{% if hx_swap_oob %} hx-swap-oob="outerHTML:#journal-month-nav"{% endif %}>
  {% if has_prev_month %}
    <a
      href="{% url 'submissions:journal_list' %}?journal={{ selected_journal_id }}&month={{ prev_month|date:'Y-m' }}"
      hx-get="{% url 'submissions:journal_list' %}?journal={{ selected_journal_id }}&month={{ prev_month|date:'Y-m' }}"
      hx-target="#journal-browser-results"
      hx-swap="innerHTML"
      hx-push-url="true"
      class="journal-month-nav__arrow"
      aria-label="Previous month"
    >&#9664;</a>
  {% else %}
    <span class="journal-month-nav__arrow journal-month-nav__arrow--disabled" aria-hidden="true">&#9664;</span>
  {% endif %}

  <div class="journal-month-nav__center">
    {% if selected_journal %}
      <span class="journal-month-nav__journal">{{ selected_journal.name }}</span>
    {% endif %}
    <span class="journal-month-nav__label">{{ selected_month|date:"F Y" }}</span>
  </div>

  {% if has_next_month %}
    <a
      href="{% url 'submissions:journal_list' %}?journal={{ selected_journal_id }}&month={{ next_month|date:'Y-m' }}"
      hx-get="{% url 'submissions:journal_list' %}?journal={{ selected_journal_id }}&month={{ next_month|date:'Y-m' }}"
      hx-target="#journal-browser-results"
      hx-swap="innerHTML"
      hx-push-url="true"
      class="journal-month-nav__arrow"
      aria-label="Next month"
    >&#9654;</a>
  {% else %}
    <span class="journal-month-nav__arrow journal-month-nav__arrow--disabled" aria-hidden="true">&#9654;</span>
  {% endif %}
</nav>
