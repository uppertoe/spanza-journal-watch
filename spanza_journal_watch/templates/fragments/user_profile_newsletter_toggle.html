<div class="d-flex justify-content-between align-items-center">
  <div>
    <p class="fw-semibold mb-0">Newsletter</p>
    <p class="text-muted small mb-0">
      {% if user_is_subscribed %}Subscribed{% else %}Not subscribed{% endif %}
    </p>
  </div>
  <div class="form-check form-switch">
    <input
      class="form-check-input"
      type="checkbox"
      role="switch"
      id="newsletter-toggle"
      {% if user_is_subscribed %}checked{% endif %}
      hx-post="{% url 'newsletter:toggle_subscription' %}"
      hx-target="#profile-newsletter-toggle"
      hx-swap="innerHTML"
    >
    <label class="form-check-label visually-hidden" for="newsletter-toggle">Newsletter subscription</label>
  </div>
</div>
