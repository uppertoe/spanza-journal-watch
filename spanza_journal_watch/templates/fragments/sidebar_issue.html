{% load responsive_images %}
<li>
    <a class="d-flex flex-column flex-lg-row gap-3 align-items-start align-items-lg-center p-3 p-md-0 py-md-3 link-body-emphasis text-decoration-none border-top" href="{{ issue.get_absolute_url }}">
      <div class="col-4 d-none d-lg-block">
  {% with issue_image=issue.get_issue_image %}
  {% if issue_image %}
  <img
    src="{{ issue_image|image_variant_url:240 }}"
    srcset="{% image_variant_srcset issue_image 240 480 %}"
    sizes="200px"
    height="150"
    class="w-100 center-thumbnail object-fit-cover rounded"
    decoding="async"
  >
      {% else %}
      <svg class="rounded" height="150" width="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice" focusable="false"><rect width="100%" height="100%" fill="#777"/></svg>
      {% endif %}
      {% endwith %}
      </div>
      <div class="col-lg-8">
        <h6 class="mb-0">{{ issue.name }}</h6>
        <small class="text-body-secondary">Articles from {{ issue.date|date:"F Y" }} onwards</small>
      </div>
    </a>
  </li>
