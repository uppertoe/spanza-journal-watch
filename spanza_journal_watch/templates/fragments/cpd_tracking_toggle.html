<div class="d-flex justify-content-between align-items-center">
  <div>
    <p class="fw-semibold mb-0">CPD tracking</p>
    <p class="text-muted small mb-0">
      {% if user.cpd_tracking_enabled %}Tracking full-text clicks{% else %}Disabled{% endif %}
    </p>
  </div>
  <div class="form-check form-switch">
    <input
      class="form-check-input"
      type="checkbox"
      role="switch"
      id="cpd-tracking-toggle"
      {% if user.cpd_tracking_enabled %}checked{% endif %}
      hx-post="{% url 'cpd:toggle_tracking' %}"
      hx-target="#profile-cpd-toggle"
      hx-swap="innerHTML"
    >
    <label class="form-check-label visually-hidden" for="cpd-tracking-toggle">CPD tracking</label>
  </div>
</div>
