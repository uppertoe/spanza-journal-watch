{% load responsive_images %}
{% if content.light_gradient or content.dark_gradient %}
<style>
    {% if content.light_gradient %}
    .transparent-overlay{
        {{ content.light_gradient }}
    }
    {% endif %}
    {% if content.dark_gradient %}
    [data-bs-theme='dark'] .transparent-overlay{
        {{ content.dark_gradient }}
    }
    {% endif %}
</style>
{% endif %}
<div class="p-4 p-md-5 mb-4 rounded text-body-emphasis bg-body-secondary main-feature">
    {% if content.image %}
    <div class="transparent-overlay"></div>
    <img
      src="{{ content.image|image_variant_url:480 }}"
      srcset="{% image_variant_srcset content.image 240 480 %}"
      sizes="(min-width: 768px) 736px, 100vw"
      alt="Feature Image"
      class="feature-image"
      fetchpriority="high"
      {% if content.image_width_safe %}width="{{ content.image_width_safe }}"{% endif %}
      {% if content.image_height_safe %}height="{{ content.image_height_safe }}"{% endif %}
    >
    {% endif %}
    <div class="row">
    <div class="col-lg-8 feature-content">
        <h1 class="display-4 fst-italic">{{ content.title|capfirst }}</h1>
        <div class="lead my-3">{{ content.body|capfirst }}</div>
      </div>
    </div>
</div>
