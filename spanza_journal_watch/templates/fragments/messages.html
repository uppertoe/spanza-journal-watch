{% if messages %}
<div id="oob-message" hx-swap-oob="true">
  {% for message in messages %}
    <div class="alert alert-dismissible {{ message.tags }} mb-0 rounded-0" style="border-left: none; border-right: none;">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
</div>
{% endif %}
