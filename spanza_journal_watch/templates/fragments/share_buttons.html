<div class="share-actions d-flex flex-wrap gap-2" aria-label="Share review">
    <a class="share-chip share-chip--bluesky" target="_blank" rel="noopener noreferrer" href="{{ bluesky_share_url }}" aria-label="Share on Bluesky">
        <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-bluesky"></use></svg>
        <span>Bluesky</span>
    </a>
    <a class="share-chip share-chip--x" target="_blank" rel="noopener noreferrer" href="{{ x_share_url|default:'#' }}" aria-label="Share on X">
        <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-x"></use></svg>
        <span>X</span>
    </a>
    <a class="share-chip share-chip--facebook" target="_blank" rel="noopener noreferrer" href="{{ facebook_share_url|default:'#' }}" aria-label="Share on Facebook">
        <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-facebook"></use></svg>
        <span>Facebook</span>
    </a>
    <a class="share-chip share-chip--email" target="_blank" rel="noopener noreferrer" href="{{ email_share_url|default:'#' }}" aria-label="Share by email">
        <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-email"></use></svg>
        <span>Email</span>
    </a>
</div>
