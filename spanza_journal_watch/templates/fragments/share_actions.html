<div class="share-actions{% if show_social_links %} share-actions--with-social{% endif %}" aria-label="{{ aria_label|default:'Share review' }}">
    <div class="share-actions__primary d-flex flex-wrap gap-2 align-items-center">
        <button
            type="button"
            class="share-chip share-chip--copy"
            data-copy-share
            data-share-url="{{ canonical_url|default:'' }}"
        >
            <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-share"></use></svg>
            <span>Copy link</span>
        </button>
        <a
            class="share-chip share-chip--email{% if not email_share_url %} disabled{% endif %}"
            {% if email_share_url %}href="{{ email_share_url }}"{% else %}href="#" aria-disabled="true"{% endif %}
            data-share-email
            aria-label="Share by email"
        >
            <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-email"></use></svg>
            <span>Email</span>
        </a>
        <button
            type="button"
            class="share-chip share-chip--native d-none"
            data-native-share
            data-share-title="{{ share_title|default:'' }}"
            data-share-text="{{ share_email_summary|default:'' }}"
            data-share-url="{{ canonical_url|default:'' }}"
        >
            <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-share"></use></svg>
            <span>Share</span>
        </button>
    </div>
    {% if show_social_links %}
    <div class="share-actions__secondary d-flex flex-wrap gap-2" aria-label="Additional sharing options">
        <a class="share-chip share-chip--bluesky" target="_blank" rel="noopener noreferrer" href="{{ bluesky_share_url }}" aria-label="Share on Bluesky">
            <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-bluesky"></use></svg>
            <span class="visually-hidden">Bluesky</span>
        </a>
        <a class="share-chip share-chip--x" target="_blank" rel="noopener noreferrer" href="{{ x_share_url|default:'#' }}" aria-label="Share on X">
            <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-x"></use></svg>
            <span class="visually-hidden">X</span>
        </a>
        <a class="share-chip share-chip--facebook" target="_blank" rel="noopener noreferrer" href="{{ facebook_share_url|default:'#' }}" aria-label="Share on Facebook">
            <svg class="share-chip__icon" aria-hidden="true"><use href="#icon-facebook"></use></svg>
            <span class="visually-hidden">Facebook</span>
        </a>
    </div>
    {% endif %}
</div>
