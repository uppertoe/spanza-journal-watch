{% extends "backend/backend_base.html" %}
{% load tz %}

{% block title %}Inbox — Journal Watch{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h4 class="mb-0">Inbox</h4>
</div>

<div class="card border-0 bg-body-tertiary mb-3">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md">
        <label class="form-label small text-muted mb-1" for="inbox-search">Filter threads</label>
        <input
          id="inbox-search"
          type="search"
          name="q"
          class="form-control"
          placeholder="Search by email or subject"
          value="{{ query }}"
          hx-get="{% url 'backend:inbox' %}"
          hx-target="#inbox-thread-list"
          hx-trigger="input changed delay:250ms, search"
          hx-push-url="true"
        >
      </div>
      <div class="col-12 col-md-auto">
        <form
          method="post"
          action="{% url 'backend:inbox_mark_all_read' %}"
          hx-post="{% url 'backend:inbox_mark_all_read' %}"
          hx-target="#inbox-thread-list"
          hx-include="#inbox-search"
        >
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-secondary w-100">Mark All as Read</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="inbox-thread-list">
  {% include "backend/_inbox_thread_list.html" %}
</div>
{% endblock %}
