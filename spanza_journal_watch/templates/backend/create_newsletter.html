{% extends "backend/backend_base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<h1>Create newsletter</h1>
<p class="text-muted">Create a new newsletter. The issue defaults to the most recent active issue.</p>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-primary">Create newsletter</button>
  <a href="{% url "backend:newsletter_release_list" %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock content %}
