name: Build and push Docker images

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: refs
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            TAG="${TAG#v}"
            APP_TAGS="${DOCKERHUB_NAMESPACE}/journalwatch-app:${TAG}"
            MJML_TAGS="${DOCKERHUB_NAMESPACE}/journalwatch-mjml:${TAG}"
          else
            TAG="sha-${GITHUB_SHA::7}"
            APP_TAGS="${DOCKERHUB_NAMESPACE}/journalwatch-app:${TAG}\n${DOCKERHUB_NAMESPACE}/journalwatch-app:latest"
            MJML_TAGS="${DOCKERHUB_NAMESPACE}/journalwatch-mjml:${TAG}\n${DOCKERHUB_NAMESPACE}/journalwatch-mjml:latest"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "app_tags<<EOF"
            echo -e "$APP_TAGS"
            echo "EOF"
            echo "mjml_tags<<EOF"
            echo -e "$MJML_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push journalwatch app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/production/django/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.refs.outputs.app_tags }}

      - name: Build and push mjml image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/production/mjml-tcp/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.refs.outputs.mjml_tags }}
