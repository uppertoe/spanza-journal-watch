# Journal Watch — compose snippet for the vps-base-template server repo.
# Copy the apps/journalwatch/ directory into your server repo's apps/ folder.
#
# Bring up the full stack:
#   docker compose --profile workers --profile planka up -d
#
# Scale workers independently:
#   docker compose up -d --scale jw_celeryworker=2

networks:
  caddy:
    external: true # created by scaffold/docker/caddy.base.yml
  jw_internal:
    name: jw_internal
    driver: bridge

volumes:
  jw_postgres_data: {}
  jw_postgres_backups: {}
  jw_planka_data: {}
  jw_planka_postgres_data: {}
  jw_access_logs: {}

services:
  # ---------------------------------------------------------------------------
  # Django (gunicorn)
  # ---------------------------------------------------------------------------
  jw_django: &jw_django
    image: ${JW_DOCKERHUB_NAMESPACE}/journalwatch-app:${JW_APP_TAG:-latest}
    restart: unless-stopped
    command: /start
    depends_on:
      jw_postgres:
        condition: service_healthy
      jw_redis:
        condition: service_started
      jw_mjml:
        condition: service_started
    env_file: .env
    environment:
      # Docker-internal addresses — always set here, never in .env
      POSTGRES_HOST: jw_postgres
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://jw_redis:6379/0
      PLANKA_BASE_URL: http://jw_planka:1337
      PLANKA_DB_URL: postgresql://postgres@jw_planka_postgres/planka
    volumes:
      - jw_access_logs:/app/access_logs
    networks:
      - caddy
      - jw_internal

  # ---------------------------------------------------------------------------
  # PostgreSQL (Django)
  # ---------------------------------------------------------------------------
  jw_postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - jw_postgres_data:/var/lib/postgresql/data
      - jw_postgres_backups:/backups
    # Loopback-only — lets the host-side backup agent (ops/systemd/) connect
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spanza_journal_watch}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # Redis (Celery broker + Django cache)
  # ---------------------------------------------------------------------------
  jw_redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # MJML TCP server (transactional email template rendering)
  # ---------------------------------------------------------------------------
  jw_mjml:
    image: ${JW_DOCKERHUB_NAMESPACE}/journalwatch-mjml:${JW_APP_TAG:-latest}
    restart: unless-stopped
    command: ['--mjml.minify=true', '--mjml.validationLevel=strict']
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # Celery worker  (profile: workers)
  # ---------------------------------------------------------------------------
  jw_celeryworker:
    <<: *jw_django
    command: /start-celeryworker
    profiles: ['workers']
    networks:
      - jw_internal # workers don't need Caddy access

  # ---------------------------------------------------------------------------
  # Celery beat  (profile: workers)
  # ---------------------------------------------------------------------------
  jw_celerybeat:
    <<: *jw_django
    command: /start-celerybeat
    profiles: ['workers']
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # Planka  (profile: planka)
  # ---------------------------------------------------------------------------
  jw_planka:
    image: ghcr.io/plankanban/planka:2.1.0
    restart: unless-stopped
    profiles: ['planka']
    depends_on:
      jw_planka_postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Internal DB URL — always set here
      DATABASE_URL: postgresql://postgres@jw_planka_postgres/planka
      # These derive from .env values; Docker Compose substitutes them at startup.
      # Load .env into shell before running docker compose:
      #   set -a; source apps/journalwatch/.env; set +a
      OIDC_ISSUER: ${OIDC_ISS_ENDPOINT}
      DEFAULT_ADMIN_EMAIL: ${PLANKA_ADMIN_EMAIL}
      S3_REGION: ${PLANKA_S3_REGION}
      S3_ACCESS_KEY_ID: ${PLANKA_S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${PLANKA_S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${PLANKA_S3_BUCKET}
      S3_FORCE_PATH_STYLE: 'false'
    volumes:
      - ./planka/custom:/app/terms/custom:ro
    networks:
      - caddy
      - jw_internal

  # ---------------------------------------------------------------------------
  # PostgreSQL (Planka)
  # ---------------------------------------------------------------------------
  jw_planka_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['planka']
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - jw_planka_postgres_data:/var/lib/postgresql/data
    # Port 5433 avoids conflict with Django postgres on 5432
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d planka']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jw_internal
