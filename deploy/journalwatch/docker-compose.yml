# Journal Watch — included into the server master docker-compose.yml
# Bring up with:  docker compose --profile workers --profile planka up -d

networks:
  caddy:
    external: true # created by scaffold/docker/caddy.base.yml
  jw_internal:
    name: jw_internal
    driver: bridge

volumes:
  jw_postgres_data: {}
  jw_postgres_backups: {}
  jw_planka_data: {}
  jw_planka_postgres_data: {}
  jw_access_logs: {}
  jw_staticfiles: {}

services:
  # ---------------------------------------------------------------------------
  # Django (gunicorn)
  # ---------------------------------------------------------------------------
  jw_django: &jw_django
    image: ${JW_DOCKERHUB_NAMESPACE}/journalwatch-app:${JW_APP_TAG:-latest}
    restart: unless-stopped
    mem_reservation: 256m
    oom_score_adj: -300
    pids_limit: 128
    command: /start
    depends_on:
      jw_postgres:
        condition: service_healthy
      jw_redis:
        condition: service_healthy
      jw_mjml:
        condition: service_healthy
    env_file: .env
    environment:
      # Docker-internal addresses — always override these here, not in .env
      POSTGRES_HOST: jw_postgres
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://jw_redis:6379/0
      PLANKA_BASE_URL: http://jw_planka:1337
      PLANKA_DB_URL: postgresql://postgres:${PLANKA_POSTGRES_PASSWORD}@jw_planka_postgres/planka
    volumes:
      - jw_access_logs:/app/access_logs
      - jw_staticfiles:/app/staticfiles
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; req = urllib.request.Request('http://127.0.0.1:5000/healthz', headers={'Host': 'journalwatch.org.au'}); urllib.request.urlopen(req, timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - caddy
      - jw_internal

  caddy:
    volumes:
      - jw_staticfiles:/srv/static/journal-watch:ro

  # ---------------------------------------------------------------------------
  # PostgreSQL (Django)
  # ---------------------------------------------------------------------------
  jw_postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    oom_score_adj: -500
    pids_limit: 128
    env_file: .env
    volumes:
      - jw_postgres_data:/var/lib/postgresql/data
      - jw_postgres_backups:/backups
    # Exposed on loopback only so the VPS backup agent can connect from the host
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spanza_journal_watch}',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # Redis (Celery broker + Django cache)
  # ---------------------------------------------------------------------------
  jw_redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 128m
    oom_score_adj: 300
    pids_limit: 64
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # MJML TCP server (email template rendering)
  # ---------------------------------------------------------------------------
  jw_mjml:
    image: ${JW_DOCKERHUB_NAMESPACE}/journalwatch-mjml:${JW_APP_TAG:-latest}
    restart: unless-stopped
    mem_limit: 128m
    oom_score_adj: 400
    pids_limit: 64
    command: ['--mjml.minify=true', '--mjml.validationLevel=strict']
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const net=require('net'); const socket=net.connect({host:'127.0.0.1',port:28101},()=>{socket.end(); process.exit(0)}); socket.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),5000);",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # Celery worker + beat
  # ---------------------------------------------------------------------------
  jw_celeryworker:
    <<: *jw_django
    command: /start-celeryworker
    mem_reservation: 192m
    oom_score_adj: -100
    volumes:
      - jw_access_logs:/app/access_logs
    networks:
      - jw_internal # workers don't need caddy

  jw_celerybeat:
    <<: *jw_django
    command: /start-celerybeat
    mem_reservation: 64m
    mem_limit: 128m
    oom_score_adj: 350
    pids_limit: 64
    volumes:
      - jw_access_logs:/app/access_logs
    networks:
      - jw_internal

  # ---------------------------------------------------------------------------
  # Planka (profile: planka)
  # ---------------------------------------------------------------------------
  jw_planka:
    image: ghcr.io/plankanban/planka:2.1.0
    restart: unless-stopped
    mem_limit: 256m
    oom_score_adj: 250
    pids_limit: 128
    depends_on:
      jw_planka_postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${PLANKA_POSTGRES_PASSWORD}@jw_planka_postgres/planka
      # OIDC issuer is the public Django URL — read from .env
      OIDC_ISSUER: ${OIDC_ISS_ENDPOINT}
      DEFAULT_ADMIN_EMAIL: ${PLANKA_ADMIN_EMAIL}
      S3_REGION: ${PLANKA_S3_REGION}
      S3_ACCESS_KEY_ID: ${PLANKA_S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${PLANKA_S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${PLANKA_S3_BUCKET}
      S3_FORCE_PATH_STYLE: 'false'
    volumes:
      - ./planka/custom:/app/terms/custom:ro
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http'); const req=http.get('http://127.0.0.1:1337/', (res)=>{process.exit(res.statusCode === 200 ? 0 : 1)}); req.on('error',()=>process.exit(1)); req.setTimeout(5000,()=>{req.destroy(); process.exit(1)});",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - caddy
      - jw_internal

  # ---------------------------------------------------------------------------
  # PostgreSQL (Planka)
  # ---------------------------------------------------------------------------
  jw_planka_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    oom_score_adj: -400
    pids_limit: 128
    environment:
      POSTGRES_DB: planka
      POSTGRES_PASSWORD: ${PLANKA_POSTGRES_PASSWORD}
    volumes:
      - jw_planka_postgres_data:/var/lib/postgresql/data
    # Port 5433 avoids conflict with Django postgres on 5432
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'PGPASSWORD=$${POSTGRES_PASSWORD} pg_isready -U postgres -d planka',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - jw_internal
