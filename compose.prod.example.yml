volumes:
  postgres_data: {}
  postgres_data_backups: {}
  access_logs: {}
  planka_postgres_data: {}

services:
  django: &django
    image: ${DOCKERHUB_NAMESPACE}/journalwatch-app:${APP_TAG}
    restart: unless-stopped
    command: /start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mjml:
        condition: service_started
    env_file: .env
    environment:
      # Docker-internal addresses — do not override in .env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      PLANKA_BASE_URL: http://planka:1337
      PLANKA_DB_URL: postgresql://postgres@planka_postgres/planka
    ports:
      - '5000:5000'
    volumes:
      - access_logs:/app/access_logs

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_data_backups:/backups
    # Exposed on loopback only so the VPS backup script can connect from the host.
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  mjml:
    image: ${DOCKERHUB_NAMESPACE}/journalwatch-mjml:${APP_TAG}
    restart: unless-stopped
    command: ['--mjml.minify=true', '--mjml.validationLevel=strict']
    expose:
      - '28101'

  celeryworker:
    <<: *django
    command: /start-celeryworker
    profiles: ['workers']
    ports: []

  celerybeat:
    <<: *django
    command: /start-celerybeat
    profiles: ['workers']
    ports: []

  flower:
    <<: *django
    command: /start-flower
    profiles: ['workers']
    ports:
      - '5555:5555'

  planka:
    image: ghcr.io/plankanban/planka:2.1.0
    restart: unless-stopped
    profiles: ['planka']
    depends_on:
      planka_postgres:
        condition: service_healthy
    volumes:
      # No data volume — attachments stored in S3 (see S3_* in .env)
      - ./planka/custom:/app/terms/custom:ro
    env_file: .env
    ports:
      - '3001:1337'

  planka_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['planka']
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - planka_postgres_data:/var/lib/postgresql/data
    # Exposed on port 5433 to avoid conflict with Django postgres on 5432.
    # The VPS backup script uses PLANKA_DB_PORT=5433.
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d planka']
      interval: 10s
      timeout: 5s
      retries: 5
